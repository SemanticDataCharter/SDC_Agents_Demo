# SDC Agents Demo — Lite Stack
# GraphDB + PostgreSQL only (~2-3GB RAM)
# For full enterprise stack (SirixDB, Keycloak), see SDCStudio AppGen

services:
  graphdb:
    image: ontotext/graphdb:10.8.4
    container_name: sdc-demo-graphdb
    ports:
      - "7200:7200"
    volumes:
      - graphdb_data:/opt/graphdb/home
    environment:
      GDB_HEAP_SIZE: 1g
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: sdc-demo-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: sdc4_demo
      POSTGRES_USER: sdc4
      POSTGRES_PASSWORD: sdc4_demo_pass
    restart: unless-stopped

volumes:
  graphdb_data:
  postgres_data:
