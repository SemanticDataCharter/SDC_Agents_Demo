# SDC Agents Demo — GraphDB with OWL 2 RL Reasoning
# Usage: docker compose up -d

services:
  graphdb:
    image: ontotext/graphdb:10.8.4
    container_name: sdc-demo-graphdb
    ports:
      - "7200:7200"
    volumes:
      - graphdb_data:/opt/graphdb/home
    environment:
      GDB_HEAP_SIZE: 1g
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7200/rest/repositories"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

volumes:
  graphdb_data:
