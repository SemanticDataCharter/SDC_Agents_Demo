name: Feature Request
description: Suggest a new feature or enhancement for the demo
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the feature and its motivation.

  - type: dropdown
    id: area
    attributes:
      label: Which area does this relate to?
      options:
        - Sample datasets
        - Schema artifacts
        - Demo pipeline (demo.py)
        - GraphDB / SPARQL queries
        - Documentation
        - Docker / Podman setup
        - New demo scenario
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what workflow does it improve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Include examples or snippets if applicable.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered and why this one is better.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: How large is this change?
      options:
        - Small (typo, config tweak, single file)
        - Medium (new dataset, new query, script changes)
        - Large (new pipeline step, architecture change)
    validations:
      required: true
